<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Stock Report - {{ report_date }}</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background: #F5F5F7;
            color: #1A1A1A;
            font-size: 14px;
            padding: 20px 16px 40px;
            max-width: 480px;
            margin: 0 auto;
        }

        .header { margin-bottom: 24px; }
        .header-date { font-size: 12px; color: #8E8E93; margin-bottom: 4px; }
        .header-title { font-size: 22px; font-weight: 600; line-height: 1.3; }

        .section-label {
            font-size: 11px;
            font-weight: 600;
            color: #8E8E93;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin: 24px 0 10px;
        }

        .card {
            background: #FFFFFF;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 10px;
        }

        .market-summary-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }

        .market-card {
            background: #FFFFFF;
            border-radius: 16px;
            padding: 16px;
        }

        .market-card-label { font-size: 12px; color: #8E8E93; margin-bottom: 6px; }
        .market-card-value { font-size: 20px; font-weight: 600; margin-bottom: 4px; }

        .change-up { color: #1A9C4E; }
        .change-down { color: #D93025; }

        .stock-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #F0F0F0;
        }
        .stock-row:last-child { border-bottom: none; }

        .stock-info { display: flex; align-items: center; gap: 12px; }
        .stock-icon {
            width: 36px; height: 36px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 10px; font-weight: 600; color: white;
        }
        .icon-blue { background: #007AFF; }
        .icon-green { background: #34C759; }
        .icon-purple { background: #AF52DE; }
        .icon-orange { background: #FF9500; }
        .icon-red { background: #FF3B30; }

        .stock-name { font-size: 14px; font-weight: 600; }
        .stock-fullname { font-size: 11px; color: #8E8E93; }
        .stock-right { text-align: right; }
        .stock-price { font-size: 14px; font-weight: 600; }
        .stock-change { font-size: 12px; }

        .chart-container { margin-top: 12px; }

        .news-item { padding: 14px 0; border-bottom: 1px solid #F0F0F0; }
        .news-item:last-child { border-bottom: none; }
        .news-source { font-size: 11px; color: #8E8E93; margin-bottom: 4px; }
        .news-headline { font-size: 14px; font-weight: 500; line-height: 1.4; }

        .ai-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 10px;
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 12px;
        }
        .ai-comment { margin-top: 12px; font-size: 13px; line-height: 1.6; color: #444; }

        .footer {
            margin-top: 32px;
            text-align: center;
            font-size: 11px;
            color: #8E8E93;
            line-height: 1.6;
        }
    </style>
</head>
