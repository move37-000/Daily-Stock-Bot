name: Daily Stock Report

on:
  schedule:
    # 매일 한국시간 오전 7시 (UTC 22:00)
    - cron: '0 22 * * *'
  workflow_dispatch:  # 수동 실행 버튼

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 라이브러리 설치
        run: |
          pip install yfinance pykrx beautifulsoup4 requests

      - name: 리포트 생성
        run: python main.py

      - name: 리포트 커밋 및 푸시
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add reports/ data/
          git diff --staged --quiet || git commit -m "report: $(date +'%Y-%m-%d') 일일 리포트"
          git push